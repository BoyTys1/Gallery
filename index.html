<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petworth House · Gallery Tour</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #f5f0e8;
  --parchment: #e8dfc8;
  --oak: #6b4c2a;
  --dark: #1a1208;
  --gold: #c9a84c;
  --gold-light: #e8c96a;
  --ink: #2c1f0e;
  --panel-bg: rgba(26, 18, 8, 0.95);
  --panel-border: rgba(201, 168, 76, 0.6);
}

body {
  background: var(--dark);
  color: var(--cream);
  font-family: 'Cormorant Garamond', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: block; }

/* ── HEADER ── */
header {
  text-align: center;
  padding: 3rem 2rem 2rem;
  background: linear-gradient(to bottom, #0d0a04, var(--dark));
  border-bottom: 1px solid rgba(201,168,76,0.25);
}
header::before {
  content: '';
  display: block;
  width: 80px; height: 1px;
  background: var(--gold);
  margin: 0 auto 1.2rem;
  opacity: 0.7;
}
.property-name {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1rem, 2.5vw, 1.3rem);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 400;
  margin-bottom: 0.5rem;
}
h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 700;
  color: var(--cream);
  line-height: 1.1;
  margin-bottom: 1rem;
}
.subtitle {
  font-size: 1.1rem;
  color: rgba(245,240,232,0.55);
  font-style: italic;
  font-weight: 300;
  letter-spacing: 0.05em;
}
header::after {
  content: '';
  display: block;
  width: 80px; height: 1px;
  background: var(--gold);
  margin: 1.5rem auto 0;
  opacity: 0.7;
}

/* ── ROOM LOBBY ── */
.lobby {
  max-width: 1100px;
  margin: 0 auto;
  padding: 3rem 2rem 5rem;
}
.lobby-intro {
  text-align: center;
  margin-bottom: 3rem;
}
.lobby-intro p {
  font-size: 1.05rem;
  color: rgba(245,240,232,0.55);
  font-style: italic;
  letter-spacing: 0.06em;
}

.rooms-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 2rem;
}

.room-card {
  position: relative;
  cursor: pointer;
  border: 1px solid rgba(201,168,76,0.25);
  background: rgba(255,255,255,0.02);
  padding: 2rem 1.8rem 1.6rem;
  transition: border-color 0.3s, background 0.3s, transform 0.3s;
  overflow: hidden;
}
.room-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.room-card:hover {
  border-color: rgba(201,168,76,0.6);
  background: rgba(201,168,76,0.04);
  transform: translateY(-4px);
}
.room-card:hover::before { opacity: 1; }

.room-card-preview {
  width: 100%;
  height: 120px;
  margin-bottom: 1.3rem;
  overflow: hidden;
  opacity: 0.8;
  transition: opacity 0.3s;
}
.room-card:hover .room-card-preview { opacity: 1; }

.room-card-number {
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.6;
  margin-bottom: 0.4rem;
}
.room-card-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.35rem;
  color: var(--cream);
  margin-bottom: 0.5rem;
  line-height: 1.2;
}
.room-card-artists {
  font-size: 0.82rem;
  color: rgba(245,240,232,0.45);
  font-style: italic;
  line-height: 1.5;
}
.room-card-cta {
  margin-top: 1.2rem;
  font-size: 0.72rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0;
  transition: opacity 0.3s;
}
.room-card:hover .room-card-cta { opacity: 0.8; }

/* ── ROOM VIEW ── */
.room-view { min-height: 100vh; }

.room-header {
  text-align: center;
  padding: 2.5rem 2rem 2rem;
  background: linear-gradient(to bottom, #0d0a04, var(--dark));
  border-bottom: 1px solid rgba(201,168,76,0.2);
  position: relative;
}
.back-btn {
  position: absolute;
  left: 2rem;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 0.5rem 1rem;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.back-btn:hover {
  background: rgba(201,168,76,0.1);
  border-color: var(--gold);
}
.room-header-label {
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.7;
  margin-bottom: 0.4rem;
}
.room-header-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.6rem, 4vw, 2.8rem);
  color: var(--cream);
}

/* ── WALL ── */
.wall-container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 3rem 2rem 5rem;
}
.section-label {
  font-family: 'Playfair Display', serif;
  font-size: 0.75rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.7;
  margin-bottom: 2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(201,168,76,0.2);
}

/* Audio card (for poetry/text passages) */
.audio-card {
  border: 1px solid rgba(201,168,76,0.3);
  background: rgba(255,255,255,0.02);
  padding: 2rem;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}
.audio-card-label {
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.7;
}
.audio-card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  color: var(--cream);
  font-style: italic;
}
.audio-card-author {
  font-size: 0.9rem;
  color: rgba(245,240,232,0.5);
}
.audio-card-excerpt {
  font-size: 0.95rem;
  color: rgba(245,240,232,0.7);
  font-style: italic;
  line-height: 1.8;
  border-left: 2px solid rgba(201,168,76,0.4);
  padding-left: 1rem;
  margin-top: 0.3rem;
}
.audio-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  background: none;
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.82rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.5rem 1.1rem;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  width: fit-content;
}
.audio-btn:hover {
  background: rgba(201,168,76,0.1);
  border-color: var(--gold);
}
.audio-btn.playing {
  background: rgba(201,168,76,0.15);
  border-color: var(--gold);
}

.wall {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 3rem 2.5rem;
  align-items: start;
  margin-bottom: 3rem;
}

/* ── PAINTING ── */
.painting-wrapper {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
}
.frame {
  position: relative;
  padding: 12px;
  background: linear-gradient(135deg, #8B6914 0%, #c9a84c 25%, #6b4c2a 50%, #c9a84c 75%, #8B6914 100%);
  box-shadow: 0 0 0 2px #3d2a0a, 0 8px 30px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,220,100,0.3);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  width: 100%;
}
.frame::before {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1px solid rgba(255,220,100,0.2);
  pointer-events: none;
  z-index: 2;
}
.painting-wrapper:hover .frame {
  transform: translateY(-4px);
  box-shadow: 0 0 0 2px #5a3e0e, 0 16px 40px rgba(0,0,0,0.9), 0 0 20px rgba(201,168,76,0.2), inset 0 0 0 1px rgba(255,220,100,0.4);
}
.canvas {
  display: block;
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  position: relative;
  z-index: 1;
  filter: brightness(0.92) saturate(0.9);
  transition: filter 0.3s ease;
}
.painting-wrapper:hover .canvas { filter: brightness(1.05) saturate(1.05); }

.plate { margin-top: 0.9rem; text-align: center; }
.plate-number {
  display: inline-block;
  font-family: 'Playfair Display', serif;
  font-size: 0.7rem;
  letter-spacing: 0.25em;
  color: var(--gold);
  opacity: 0.6;
  text-transform: uppercase;
  border-top: 1px solid rgba(201,168,76,0.3);
  padding-top: 0.5rem;
}
.plate-title {
  font-family: 'Playfair Display', serif;
  font-size: 0.95rem;
  color: rgba(245,240,232,0.75);
  margin-top: 0.2rem;
  font-style: italic;
}
.plate-artist {
  font-size: 0.75rem;
  color: rgba(245,240,232,0.4);
  margin-top: 0.1rem;
}

/* Per-painting audio button */
.painting-audio-btn {
  margin-top: 0.6rem;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: none;
  border: 1px solid rgba(201,168,76,0.3);
  color: rgba(201,168,76,0.7);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.3rem 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.painting-audio-btn:hover, .painting-audio-btn.playing {
  background: rgba(201,168,76,0.1);
  border-color: var(--gold);
  color: var(--gold);
}

/* ── TOOLTIP ── */
.tooltip {
  position: fixed;
  z-index: 1000;
  width: 300px;
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  padding: 1.5rem;
  pointer-events: none;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.2s ease, transform 0.2s ease;
  backdrop-filter: blur(12px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}
.tooltip.visible { opacity: 1; transform: translateY(0); }
.tooltip::before {
  content: '';
  display: block;
  width: 30px; height: 1px;
  background: var(--gold);
  margin-bottom: 0.8rem;
  opacity: 0.7;
}
.tooltip-label { font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.3rem; opacity: 0.8; }
.tooltip-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--cream); margin-bottom: 0.2rem; line-height: 1.2; }
.tooltip-artist { font-size: 0.82rem; color: rgba(245,240,232,0.55); font-style: italic; margin-bottom: 0.7rem; }
.tooltip-date { display: inline-block; font-size: 0.68rem; letter-spacing: 0.1em; color: var(--gold); border: 1px solid rgba(201,168,76,0.35); padding: 0.12rem 0.5rem; margin-bottom: 0.8rem; }
.tooltip-divider { height: 1px; background: rgba(201,168,76,0.2); margin-bottom: 0.8rem; }
.tooltip-body { font-size: 0.88rem; line-height: 1.7; color: rgba(245,240,232,0.78); font-weight: 300; }

/* ── FOOTER / LANGUAGE BAR ── */
.footer-bar {
  border-top: 1px solid rgba(201,168,76,0.15);
  padding: 1.5rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
  background: linear-gradient(to top, #0d0a04, var(--dark));
}
.footer-copy {
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  color: rgba(245,240,232,0.25);
  text-transform: uppercase;
}
.lang-selector {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.lang-selector-label {
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(245,240,232,0.35);
  margin-right: 0.3rem;
}
.lang-btn {
  background: none;
  border: 1px solid rgba(201,168,76,0.25);
  color: rgba(245,240,232,0.45);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.8rem;
  padding: 0.25rem 0.65rem;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}
.lang-btn:hover, .lang-btn.active {
  border-color: rgba(201,168,76,0.6);
  color: var(--gold);
  background: rgba(201,168,76,0.06);
}

/* ── CSS PAINTING CANVASES ── */
.css-painting {
  width: 100%;
  aspect-ratio: 4/3;
  display: block;
}

@media (max-width: 650px) {
  .back-btn { position: static; transform: none; margin-bottom: 1rem; }
  .room-header { display: flex; flex-direction: column; align-items: center; }
  .tooltip { width: 240px; }
  .rooms-grid, .wall { grid-template-columns: 1fr; }
}
</style>
</head>

      <button class="lang-btn" onclick="setLang('zh')">中文</button>

    </div>
  </footer>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-label" data-i18n="artworkLabel">Artwork</div>

let currentLang = 'en';
const t = key => (i18n[currentLang] && i18n[currentLang][key]) || i18n.en[key] || key;

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = t(key);
  });
  document.querySelectorAll('.audio-btn').forEach(btn => {
    if (!btn.classList.contains('playing')) btn.textContent = t('listenBtn');
  });
  document.querySelectorAll('.painting-audio-btn').forEach(btn => {
    if (!btn.classList.contains('playing')) btn.textContent = t('readAloud');
  });
  document.querySelectorAll('.room-card-cta').forEach(el => {
    el.textContent = t('enterRoom');
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.getAttribute('onclick').includes(`'${currentLang}'`)) btn.classList.add('active');
  });
}

function setLang(lang) {
  currentLang = lang;
  applyTranslations();
  // Re-render lobby cards if on lobby
  if (document.getElementById('screen-lobby').classList.contains('active')) {
    renderLobby();
  }
}

function renderLobby() {
  const grid = document.getElementById('rooms-grid');
  grid.innerHTML = '';
  ROOMS.forEach((room, idx) => {
    const card = document.createElement('div');
    card.className = 'room-card';
    card.onclick = () => openRoom(room.id);
    const numStr = String(idx + 1).padStart(2, '0');
    const previewFn = roomPreviews[room.id];
    card.innerHTML = `
      <div class="room-card-preview">${previewFn ? previewFn() : ''}</div>
      <div class="room-card-number">Room ${numStr}</div>
      <div class="room-card-name">${room.name}</div>
      <div class="room-card-artists">${room.artists}</div>
      <div class="room-card-cta">${t('enterRoom')}</div>
    `;
    grid.appendChild(card);
  });
}

/* ══════════════════════════════════════════════
   ROOM RENDERING
══════════════════════════════════════════════ */

let currentRoomId = null;

function openRoom(roomId) {
  stopAllAudio();
  currentRoomId = roomId;
  const room = ROOMS.find(r => r.id === roomId);
  if (!room) return;

  document.getElementById('room-header-title').textContent = room.name;

  const container = document.getElementById('wall-container');
  container.innerHTML = '';

  let paintingIndex = 0;

  room.sections.forEach(section => {
    if (section.type === 'paintings') {
      const label = document.createElement('p');
      label.className = 'section-label';
      label.textContent = section.artist;
      container.appendChild(label);

      const wall = document.createElement('div');
      wall.className = 'wall';
      container.appendChild(wall);

      section.works.forEach(work => {
        paintingIndex++;
        const wrapper = document.createElement('div');
        wrapper.className = 'painting-wrapper';
        wrapper.dataset.title = work.title;
        wrapper.dataset.artist = section.artist;
        wrapper.dataset.date = work.date;
        wrapper.dataset.body = work.body;

        const numStr = String(paintingIndex).padStart(2, '0');
        const audioText = `${work.title}, by ${section.artist}, ${work.date}. ${work.body}`;

        wrapper.innerHTML = `
          <div class="frame">${work.svg}</div>
          <div class="plate">
            <div class="plate-number">No. ${numStr}</div>
            <div class="plate-title">${work.title}</div>
            <div class="plate-artist">${section.artist}</div>
          </div>
          <button class="painting-audio-btn" onclick="togglePaintingAudio(this, ${JSON.stringify(audioText).replace(/'/g,"\\'")})">${t('readAloud')}</button>
        `;

        wall.appendChild(wrapper);
      });

    } else if (section.type === 'audio') {
      const label = document.createElement('p');
      label.className = 'section-label';
      label.textContent = t('audioLabel');
      container.appendChild(label);

      const card = document.createElement('div');
      card.className = 'audio-card';
      const lines = section.excerpt.split('\n').join('<br>');
      card.innerHTML = `
        <div class="audio-card-label">${section.label}</div>
        <div class="audio-card-title">${section.title}</div>
        <div class="audio-card-author">${section.author}</div>
        <div class="audio-card-excerpt">${lines}</div>
        <button class="audio-btn" onclick="toggleAudio(this, ${JSON.stringify(section.audioText).replace(/'/g,"\\'")})">${t('listenBtn')}</button>
      `;
      container.appendChild(card);
    }
  });

  // Show room screen
  document.getElementById('screen-lobby').classList.remove('active');
  document.getElementById('screen-room').classList.add('active');
  window.scrollTo(0, 0);

  // Re-attach tooltip listeners
  attachTooltips();
}

function goToLobby() {
  stopAllAudio();
  document.getElementById('screen-room').classList.remove('active');
  document.getElementById('screen-lobby').classList.add('active');
  window.scrollTo(0, 0);
}

/* ══════════════════════════════════════════════
   TOOLTIP
══════════════════════════════════════════════ */

const tooltip = document.getElementById('tooltip');
const ttTitle = document.getElementById('tt-title');
const ttArtist = document.getElementById('tt-artist');
const ttDate = document.getElementById('tt-date');
const ttBody = document.getElementById('tt-body');
const OFFSET = 20, PADDING = 16;

function positionTooltip(x, y) {
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = x + OFFSET, top = y + OFFSET;
  if (left + tw + PADDING > vw) left = x - tw - OFFSET;
  if (top + th + PADDING > vh) top = y - th - OFFSET;
  if (left < PADDING) left = PADDING;
  if (top < PADDING) top = PADDING;
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}

function attachTooltips() {
  document.querySelectorAll('.painting-wrapper').forEach(el => {
    el.addEventListener('mouseenter', () => {
      ttTitle.textContent = el.dataset.title;
      ttArtist.textContent = el.dataset.artist;
      ttDate.textContent = el.dataset.date;
      ttBody.textContent = el.dataset.body;
      tooltip.classList.add('visible');
    });
    el.addEventListener('mousemove', e => positionTooltip(e.clientX, e.clientY));
    el.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
  });
}

/* ══════════════════════════════════════════════
   AUDIO (Web Speech API)
══════════════════════════════════════════════ */

let currentUtterance = null;
let currentAudioBtn = null;

function stopAllAudio() {
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
  }
  document.querySelectorAll('.audio-btn.playing, .painting-audio-btn.playing').forEach(btn => {
    btn.classList.remove('playing');
    btn.textContent = btn.classList.contains('painting-audio-btn') ? t('readAloud') : t('listenBtn');
  });
  currentUtterance = null;
  currentAudioBtn = null;
}

function speakText(text, btn, isPoetry) {
  if (!window.speechSynthesis) {
    alert('Text-to-speech is not supported in your browser.');
    return;
  }
  stopAllAudio();

  const langMap = {
    en: 'en-GB', fr: 'fr-FR', de: 'de-DE', es: 'es-ES',
    it: 'it-IT', zh: 'zh-CN', ja: 'ja-JP'
  };

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = langMap[currentLang] || 'en-GB';
  utterance.rate = isPoetry ? 0.85 : 0.9;
  utterance.pitch = 1.0;

  utterance.onstart = () => {
    currentAudioBtn = btn;
    btn.classList.add('playing');
    btn.textContent = t(btn.classList.contains('painting-audio-btn') ? 'stopRead' : 'stopBtn');
  };
  utterance.onend = utterance.onerror = () => {
    btn.classList.remove('playing');
    btn.textContent = t(btn.classList.contains('painting-audio-btn') ? 'readAloud' : 'listenBtn');
    currentUtterance = null;
    currentAudioBtn = null;
  };

  currentUtterance = utterance;
  window.speechSynthesis.speak(utterance);
}

function toggleAudio(btn, text) {
  if (btn.classList.contains('playing')) {
    stopAllAudio();
  } else {
    speakText(text, btn, true);
  }
}

function togglePaintingAudio(btn, text) {
  if (btn.classList.contains('playing')) {
    stopAllAudio();
  } else {
    speakText(text, btn, false);
  }
}

function translatePage() {
  if (currentLang === 'en') return;

  const dict = TRANSLATIONS[currentLang] || {};

  document.querySelectorAll("body *").forEach(el => {
    if (el.children.length === 0) { // only text nodes
      const text = el.innerText.trim();
      if (dict[text]) {
        el.innerText = dict[text];
      }
    }
  });
}

// --- LANGUAGE SWITCH HOOK ---
window.setLang = function(lang) {
  currentLang = lang;

  // small delay so your original render runs first
  setTimeout(() => {
    translatePage();
  }, 100);
};

// --- AUDIO FIX ---
window.speakText = function(text) {
  if (!('speechSynthesis' in window)) return;

  const speak = () => {
    speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = (currentLang === 'fr') ? 'fr-FR' : 'en-GB';

    utterance.onerror = (e) => console.error(e);

    speechSynthesis.speak(utterance);
  };

  const voices = speechSynthesis.getVoices();

  if (!voices.length) {
    speechSynthesis.onvoiceschanged = speak;
  } else {
    speak();
  }
};

// --- MAKE ALL TEXT CLICKABLE FOR AUDIO ---
document.addEventListener('click', (e) => {
  const text = e.target.innerText;
  if (text && text.length < 200) {
    speakText(text);
  }
});
</script>
</body>
