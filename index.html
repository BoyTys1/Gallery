<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petworth House · Gallery Tour</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #f5f0e8; --parchment: #e8dfc8; --oak: #6b4c2a; --dark: #1a1208;
  --gold: #c9a84c; --gold-light: #e8c96a; --ink: #2c1f0e;
  --panel-bg: rgba(26, 18, 8, 0.95); --panel-border: rgba(201, 168, 76, 0.6);
}
body { background: var(--dark); color: var(--cream); font-family: 'Cormorant Garamond', Georgia, serif; min-height: 100vh; overflow-x: hidden; }
.screen { display: none; }
.screen.active { display: block; }
header { text-align: center; padding: 3rem 2rem 2rem; background: linear-gradient(to bottom, #0d0a04, var(--dark)); border-bottom: 1px solid rgba(201,168,76,0.25); }
header::before { content: ''; display: block; width: 80px; height: 1px; background: var(--gold); margin: 0 auto 1.2rem; opacity: 0.7; }
.property-name { font-family: 'Playfair Display', serif; font-size: clamp(1rem, 2.5vw, 1.3rem); letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); font-weight: 400; margin-bottom: 0.5rem; }
h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; color: var(--cream); line-height: 1.1; margin-bottom: 1rem; }
.subtitle { font-size: 1.1rem; color: rgba(245,240,232,0.55); font-style: italic; font-weight: 300; letter-spacing: 0.05em; }
.lobby { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem 5rem; }
.rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
.room-card { position: relative; cursor: pointer; border: 1px solid rgba(201,168,76,0.25); background: rgba(255,255,255,0.02); padding: 2rem 1.8rem 1.6rem; transition: all 0.3s; overflow: hidden; }
.room-card:hover { border-color: rgba(201,168,76,0.6); background: rgba(201,168,76,0.04); transform: translateY(-4px); }
.room-card-preview { width: 100%; height: 160px; margin-bottom: 1.3rem; object-fit: cover; border: 1px solid rgba(201,168,76,0.2); }
.room-card-name { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: var(--cream); margin-bottom: 0.5rem; }
.room-header { text-align: center; padding: 2.5rem 2rem 2rem; background: linear-gradient(to bottom, #0d0a04, var(--dark)); border-bottom: 1px solid rgba(201,168,76,0.2); position: relative; }
.back-btn { position: absolute; left: 2rem; top: 50%; transform: translateY(-50%); background: none; border: 1px solid rgba(201,168,76,0.4); color: var(--gold); padding: 0.5rem 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.8rem; }
.wall-container { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem 5rem; }
.section-label { font-family: 'Playfair Display', serif; font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem; }
.section-label::after { content: ''; flex: 1; height: 1px; background: rgba(201,168,76,0.2); }
.wall { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 3rem 2.5rem; margin-bottom: 4rem; }
.frame { padding: 12px; background: linear-gradient(135deg, #8B6914 0%, #c9a84c 25%, #6b4c2a 50%, #c9a84c 75%, #8B6914 100%); box-shadow: 0 8px 30px rgba(0,0,0,0.8); }
.frame img { width: 100%; height: 220px; object-fit: cover; display: block; }
.tooltip { position: fixed; z-index: 1000; width: 320px; background: var(--panel-bg); border: 1px solid var(--panel-border); padding: 1.5rem; pointer-events: none; opacity: 0; transition: all 0.2s; backdrop-filter: blur(12px); color: var(--cream); }
.tooltip.visible { opacity: 1; }
.footer-bar { border-top: 1px solid rgba(201,168,76,0.15); padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; background: #0d0a04; }
.lang-btn { background: none; border: 1px solid rgba(201,168,76,0.25); color: rgba(245,240,232,0.45); padding: 0.25rem 0.65rem; cursor: pointer; margin-left: 5px; font-family: 'Cormorant Garamond'; }
.lang-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
.audio-card { border: 1px solid rgba(201,168,76,0.3); background: rgba(255,255,255,0.02); padding: 2rem; margin-bottom: 3rem; }
.audio-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 0.4rem 0.8rem; cursor: pointer; text-transform: uppercase; margin-top: 0.8rem; font-size: 0.7rem; letter-spacing: 0.1em; transition: 0.2s; }
.audio-btn:hover { background: rgba(201, 168, 76, 0.1); }
.audio-btn.playing { background: var(--gold); color: var(--dark); }
</style>
</head>
<body>

<div id="screen-lobby" class="screen active">
  <header>
    <p class="property-name" data-i18n="property"></p>
    <h1 data-i18n="title"></h1>
    <p class="subtitle" data-i18n="subtitle"></p>
  </header>
  <main class="lobby">
    <div class="rooms-grid" id="rooms-grid"></div>
  </main>
</div>

<div id="screen-room" class="screen">
  <header class="room-header">
    <button class="back-btn" onclick="goToLobby()" data-i18n="backBtn"></button>
    <h1 class="room-header-title" id="room-header-title"></h1>
  </header>
  <div class="wall-container" id="wall-container"></div>
</div>

<div class="tooltip" id="tooltip">
  <div id="tt-title" style="font-family:'Playfair Display'; font-size:1.2rem;"></div>
  <div id="tt-artist" style="font-style:italic; margin-bottom:0.5rem;"></div>
  <hr style="border:0; border-top:1px solid var(--gold); margin-bottom:0.5rem; opacity:0.3;">
  <div id="tt-body" style="font-size:0.9rem; line-height:1.5;"></div>
</div>

<footer class="footer-bar">
  <span style="font-size:0.7rem; color:gray;" data-i18n="footerCopy"></span>
  <div id="lang-selectors"></div>
</footer>

<script>
let currentLang = 'en';
let currentRoomId = null;

const i18n = {
  en: { property: 'Petworth House · National Trust', title: 'The Collection', subtitle: 'Select a room to begin your tour', backBtn: '← All Rooms', enterRoom: 'Enter Room →', listenBtn: '▶ Listen', stopBtn: '■ Stop', footerCopy: 'Petworth House Tour' },
  fr: { property: 'Petworth House · National Trust', title: 'La Collection', subtitle: 'Sélectionnez une salle', backBtn: '← Retour', enterRoom: 'Entrer →', listenBtn: '▶ Écouter', stopBtn: '■ Arrêter', footerCopy: 'Visite Petworth' },
  de: { property: 'Petworth House', title: 'Die Sammlung', subtitle: 'Wählen Sie einen Raum', backBtn: '← Alle Räume', enterRoom: 'Eintreten →', listenBtn: '▶ Anhören', stopBtn: '■ Stopp', footerCopy: 'Petworth Tour' },
  es: { property: 'Petworth House', title: 'La Colección', subtitle: 'Seleccione una sala', backBtn: '← Atrás', enterRoom: 'Entrar →', listenBtn: '▶ Escuchar', stopBtn: '■ Parar', footerCopy: 'Tour Petworth' },
  it: { property: 'Petworth House', title: 'La Collezione', subtitle: 'Seleziona una sala', backBtn: '← Indietro', enterRoom: 'Entra →', listenBtn: '▶ Ascolta', stopBtn: '■ Ferma', footerCopy: 'Tour Petworth' },
  zh: { property: 'Petworth House', title: '艺术收藏', subtitle: '选择一个展厅', backBtn: '← 返回', enterRoom: '进入 →', listenBtn: '▶ 聆听', stopBtn: '■ 停止', footerCopy: '互动画廊之旅' },
  ja: { property: 'ペットワース・ハウス', title: 'コレクション', subtitle: '部屋を選んでください', backBtn: '← 戻る', enterRoom: '入る →', listenBtn: '▶ 聴く', stopBtn: '■ 停止', footerCopy: 'ギャラリーツアー' }
};

const ROOMS = [
  {
    id: 'marble-hall',
    name: { en: 'Marble Hall', fr: 'Galerie des Marbres', de: 'Marmorsaal', es: 'Salón de Mármol', it: 'Sala dei Marmi', zh: '大理石大厅', ja: 'マーブル・ホール' },
    previewImg: 'https://picsum.photos/id/10/400/300',
    sections: [
      {
        type: 'paintings', artist: 'John Constable',
        works: [
          { title: { en: 'Stonehenge', it: 'Stonehenge', fr: 'Stonehenge', es: 'Stonehenge' }, date: '1835', body: { en: 'A powerful depiction of the ancient monument.' }, img: 'https://upload.wikimedia.org/wikipedia/commons/3/3a/Constable_-_Stonehenge%2C_1629-1888%2C_2006AK8142.jpg' },
          { title: { en: 'The Hay Wain', it: 'Il Carro da Fieno', fr: 'La Charrette de foin', es: 'La carreta de heno' }, date: '1821', body: { en: 'An iconic English landscape.' }, img: 'https://picsum.photos/id/12/400/300' },
          { title: { en: 'The Cornfield', it: 'Il Campo di Grano', fr: 'Le Champ de blé', es: 'El campo de maíz' }, date: '1826', body: { en: 'A view near East Bergholt.' }, img: 'https://picsum.photos/id/13/400/300' }
        ]
      },
      {
        type: 'paintings', artist: 'J.M.W Turner',
        works: [
          { title: { en: 'The Shipwreck', it: 'Il Naufragio' }, date: '1805', body: { en: 'Mastery of maritime drama.' }, img: 'https://picsum.photos/id/14/400/300' },
          { title: { en: 'Rain, Steam and Speed', it: 'Pioggia, Vapore e Velocità' }, date: '1844', body: { en: 'The Great Western Railway.' }, img: 'https://picsum.photos/id/15/400/300' }
        ]
      },
      { type: 'audio', title: { en: 'I Wandered Lonely as a Cloud', it: 'Vagavo Solitario come una Nuvola' }, author: 'Wordsworth', audioText: { en: 'I wandered lonely as a cloud that floats on high o\'er vales and hills.' }, excerpt: { en: 'I wandered lonely...' } }
    ]
  },
  {
    id: 'beauty-room',
    name: { en: 'Beauty Room', it: 'Sala della Bellezza' },
    previewImg: 'https://picsum.photos/id/16/400/300',
    sections: [
      {
        type: 'paintings', artist: 'Claude Monet',
        works: [
          { title: { en: 'Impression, Sunrise', it: 'Impressione, Levar del Sole' }, date: '1872', body: { en: 'The dawn of impressionism.' }, img: 'https://picsum.photos/id/17/400/300' },
          { title: { en: 'Cliff Walk at Pourville', it: 'Passeggiata sulla Scogliera' }, date: '1882', body: { en: 'Luminous coastal light.' }, img: 'https://picsum.photos/id/18/400/300' }
        ]
      }
    ]
  },
  {
    id: 'little-dining-room',
    name: { en: 'Little Dining Room', it: 'Piccola Sala da Pranzo' },
    previewImg: 'https://picsum.photos/id/19/400/300',
    sections: [
      {
        type: 'paintings', artist: 'Vincent van Gogh',
        works: [
          { title: { en: 'Starry Night', it: 'Notte Stellata' }, date: '1889', body: { en: 'The view from Saint-Rémy.' }, img: 'https://picsum.photos/id/20/400/300' }
        ]
      }
    ]
  },
  {
    id: 'red-room',
    name: { en: 'Red Room', it: 'Sala Rossa' },
    previewImg: 'https://picsum.photos/id/21/400/300',
    sections: [
      {
        type: 'paintings', artist: 'Gerhard Richter',
        works: [
          { title: { en: 'Seascape Series', it: 'Serie di Marine' }, date: '1998', body: { en: 'Photorealistic ocean studies.' }, img: 'https://picsum.photos/id/22/400/300' }
        ]
      }
    ]
  },
  {
    id: 'north-gallery',
    name: { en: 'North Gallery', it: 'Galleria Nord' },
    previewImg: 'https://picsum.photos/id/23/400/300',
    sections: [
      {
        type: 'paintings', artist: 'Andreas Gursky',
        works: [
          { title: { en: 'Aletsch Glacier 1', it: 'Ghiacciaio dell\'Aletsch' }, date: '1993', body: { en: 'Stark mountain photography.' }, img: 'https://picsum.photos/id/24/400/300' }
        ]
      }
    ]
  },
  {
    id: 'pleasure-garden',
    name: { en: 'Pleasure Garden', it: 'Giardino di Piacere' },
    previewImg: 'https://picsum.photos/id/25/400/300',
    sections: [
      {
        type: 'paintings', artist: 'Claude Monet',
        works: [
          { title: { en: 'Water Lily Pond', it: 'Lo Stagno delle Ninfee' }, date: '1899', body: { en: 'The famous Japanese bridge.' }, img: 'https://picsum.photos/id/26/400/300' }
        ]
      }
    ]
  }
];

function t(key) { return i18n[currentLang][key] || i18n['en'][key]; }
function getTxt(obj) { return typeof obj === 'object' ? (obj[currentLang] || obj['en']) : obj; }

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n')); });
  const ls = document.getElementById('lang-selectors');
  const langs = ['en', 'fr', 'de', 'es', 'it', 'zh', 'ja'];
  ls.innerHTML = langs.map(l => `<button class="lang-btn ${l===currentLang?'active':''}" onclick="setLang('${l}')">${l.toUpperCase()}</button>`).join('');
}

function setLang(lang) {
  currentLang = lang;
  applyTranslations();
  if (currentRoomId) enterRoom(currentRoomId); else renderLobby();
}

function renderLobby() {
  const grid = document.getElementById('rooms-grid');
  grid.innerHTML = ROOMS.map(r => `
    <div class="room-card" onclick="enterRoom('${r.id}')">
      <img src="${r.previewImg}" class="room-card-preview">
      <div class="room-card-name">${getTxt(r.name)}</div>
      <div style="color:var(--gold); font-size:0.8rem; margin-top:0.5rem;">${t('enterRoom')}</div>
    </div>`).join('');
}

function enterRoom(id) {
  currentRoomId = id;
  const r = ROOMS.find(x => x.id === id);
  document.getElementById('screen-lobby').classList.remove('active');
  document.getElementById('screen-room').classList.add('active');
  document.getElementById('room-header-title').textContent = getTxt(r.name);
  
  const cont = document.getElementById('wall-container');
  cont.innerHTML = r.sections.map(s => {
    if (s.type === 'audio') return `
      <div class="audio-card">
        <div style="font-family:'Playfair Display'; font-size:1.5rem;">${getTxt(s.title)}</div>
        <div style="color:var(--gold); margin-bottom:1rem;">${s.author}</div>
        <p style="font-style:italic; line-height:1.6; opacity:0.8;">${getTxt(s.excerpt)}</p>
        <button class="audio-btn" onclick="toggleAudio(this, '${getTxt(s.audioText).replace(/'/g,"\\'")}')">${t('listenBtn')}</button>
      </div>`;
    return `
      <div class="section-label">${s.artist}</div>
      <div class="wall">${s.works.map(w => {
        const speechText = (getTxt(w.title) + ". " + getTxt(w.body)).replace(/'/g,"\\'");
        return `
        <div class="painting-wrapper" onmouseenter="showTooltip(event, '${getTxt(w.title).replace(/'/g,"\\'")}', '${s.artist}', '${getTxt(w.body).replace(/'/g,"\\'")}')" onmouseleave="hideTooltip()">
          <div class="frame" style="cursor:pointer;">
             <img src="${w.img}" alt="${getTxt(w.title)}">
          </div>
          <div style="text-align:center; margin-top:0.8rem; font-size:0.9rem; letter-spacing:0.05em;">${getTxt(w.title)}</div>
          <center><button class="audio-btn" onclick="toggleAudio(this, '${speechText}')">${t('listenBtn')}</button></center>
        </div>`;
      }).join('')}</div>`;
  }).join('');
}

function toggleAudio(btn, text) {
  if (btn.classList.contains('playing')) { window.speechSynthesis.cancel(); btn.classList.remove('playing'); btn.textContent = t('listenBtn'); return; }
  window.speechSynthesis.cancel();
  document.querySelectorAll('.audio-btn').forEach(b => { b.classList.remove('playing'); b.textContent = t('listenBtn'); });
  const ut = new SpeechSynthesisUtterance(text);
  const codes = { en: 'en-GB', fr: 'fr-FR', de: 'de-DE', es: 'es-ES', it: 'it-IT', zh: 'zh-CN', ja: 'ja-JP' };
  ut.lang = codes[currentLang] || 'en-GB';
  ut.onend = () => { btn.classList.remove('playing'); btn.textContent = t('listenBtn'); };
  btn.classList.add('playing'); btn.textContent = t('stopBtn');
  window.speechSynthesis.speak(ut);
}

function goToLobby() { currentRoomId = null; window.speechSynthesis.cancel(); document.getElementById('screen-room').classList.remove('active'); document.getElementById('screen-lobby').classList.add('active'); }

function showTooltip(e, t, a, b) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-title').textContent = t;
  document.getElementById('tt-artist').textContent = a;
  document.getElementById('tt-body').textContent = b;
  tt.classList.add('visible'); 
  let x = e.clientX + 20; let y = e.clientY + 20;
  if (x + 320 > window.innerWidth) x = e.clientX - 340;
  tt.style.left = x + 'px'; tt.style.top = y + 'px';
}
function hideTooltip() { document.getElementById('tooltip').classList.remove('visible'); }

window.onload = () => { setLang('en'); };
</script>
</body>
</html>
